<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#F59E0B">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AVERT SC">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" type="image/png" href="/icon-192.png">
<title>AVERT SC — Pedido</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* TOKENS — sem cinza claro, contrastes fortes */
:root{
  /* Base */
  --bg:#FAFAFA;
  --surf:#FFFFFF;
  --surf2:#F5F5F5;
  
  /* Texto — TUDO preto ou quase preto */
  --ink:#0A0A0A;
  --ink2:#262626;
  --ink3:#525252;
  
  /* Bordas */
  --line:#E5E5E5;
  --line2:#D4D4D4;
  --line3:#A3A3A3;
  
  /* Ações principais */
  --black:#0A0A0A;
  --amb:#C2410C;      /* laranja escuro pra preço base */
  --amb-bg:#FFF7ED;
  
  /* Condições — cores SATURADAS, não pastéis */
  --g:#047857;   --g-bg:#D1FAE5;   --g-ink:#064E3B;
  --b:#1D4ED8;   --b-bg:#DBEAFE;   --b-ink:#1E3A8A;
  --p:#6D28D9;   --p-bg:#EDE9FE;   --p-ink:#4C1D95;
  
  /* WhatsApp */
  --wa:#128C7E;
  --wa2:#075E54;
  
  /* Fontes */
  --sans:'Manrope',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  
  /* Safe area */
  --sab:env(safe-area-inset-bottom,0px);
}

html{font-family:var(--sans);-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--ink);font-size:16px}
body{min-height:100dvh;font-weight:500}
*{-webkit-tap-highlight-color:transparent}
input,button{font-family:var(--sans)}
button{border:none;cursor:pointer}
::-webkit-scrollbar{width:0;height:0}

@keyframes sheetIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{transform:scale(.9)}60%{transform:scale(1.04)}100%{transform:scale(1)}}

/* ═══════════════ TOP ═══════════════ */
.top{
  position:sticky;top:0;z-index:200;
  background:var(--ink);
  padding:14px 16px;
  display:flex;align-items:center;gap:14px;
  border-bottom:2px solid var(--black);
}
.top-logo{
  width:40px;height:40px;border-radius:10px;
  background:#F59E0B;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:700;font-size:13px;color:#000;
  letter-spacing:.03em;flex-shrink:0;
}
.top-title{flex:1;min-width:0}
.top-title h1{font-size:17px;font-weight:800;color:#FFF;letter-spacing:.02em;line-height:1.1}
.top-title p{font-size:12px;color:#A3A3A3;font-weight:600;margin-top:2px;font-family:var(--mono)}
.top-count{
  background:#F59E0B;color:#000;
  border-radius:999px;padding:8px 16px;
  font-weight:800;font-size:15px;
  min-width:48px;height:40px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  flex-shrink:0;
}

/* ═══════════════ SEARCH ═══════════════ */
.srch{
  position:sticky;top:70px;z-index:150;
  background:var(--bg);
  padding:12px 16px;
  border-bottom:2px solid var(--line);
}
.srch-box{position:relative}
.srch-box input{
  width:100%;height:52px;
  background:var(--surf);
  border:2px solid var(--line2);
  border-radius:12px;
  color:var(--ink);
  font-size:17px;font-weight:600;
  padding:0 46px 0 46px;
  outline:none;
  transition:border-color .12s;
}
.srch-box input::placeholder{color:var(--ink3);font-weight:500}
.srch-box input:focus{border-color:var(--black)}
.srch-ico{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:20px;pointer-events:none;color:var(--ink2)}
.srch-clr{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:36px;height:36px;border-radius:9px;
  background:var(--surf2);
  color:var(--ink2);font-size:22px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  line-height:1;
}

/* ═══════════════ COUNT BAR ═══════════════ */
.cntb{
  padding:10px 16px;
  background:var(--bg);
  display:flex;justify-content:space-between;align-items:center;
  font-size:13px;font-weight:700;
}
.cntb-total{color:var(--ink2);font-family:var(--mono)}
.cntb-sel{color:var(--g);font-weight:800;font-family:var(--mono)}

/* ═══════════════ PRODUCT CARD ═══════════════ */
.plist{padding:0 12px 100px}
.card{
  background:var(--surf);
  border:2px solid var(--line);
  border-radius:14px;
  margin-bottom:10px;
  overflow:hidden;
  transition:border-color .12s,box-shadow .12s;
}
.card.has-sel{
  border-color:var(--ink);
  box-shadow:0 4px 0 var(--ink);
  margin-bottom:16px;
}

/* Card header */
.card-h{
  padding:16px;
  display:flex;align-items:flex-start;gap:14px;
  cursor:pointer;
  user-select:none;
  background:var(--surf);
}
.card.has-sel .card-h{
  background:var(--surf);
  border-bottom:2px solid var(--ink);
}
.expand-ico{
  width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  color:var(--ink2);
  font-size:20px;font-weight:800;
  transition:transform .15s;
}
.card.open .expand-ico{transform:rotate(90deg);color:var(--ink)}
.prod-info{flex:1;min-width:0}
.prod-name{
  font-size:17px;font-weight:800;
  color:var(--ink);
  line-height:1.2;
  letter-spacing:-.01em;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.prod-meta{
  display:flex;align-items:center;gap:10px;margin-top:6px;
  font-family:var(--mono);font-size:13px;font-weight:600;
}
.prod-code{color:var(--ink3)}
.prod-sep{color:var(--line2)}
.prod-price{color:var(--amb);font-weight:800;font-size:15px}
.prod-pdv{color:var(--ink3);font-size:12px}
.prod-badge{
  background:var(--ink);color:#F59E0B;
  border-radius:8px;padding:5px 10px;
  font-family:var(--mono);font-weight:800;font-size:13px;
  flex-shrink:0;
  min-height:30px;display:flex;align-items:center;
}

/* ═══════════════ COND PICKER ═══════════════ */
.cond-box{
  background:var(--bg);
  padding:16px;
  display:none;
}
.card.open .cond-box{display:block}

.cond-h{
  font-size:12px;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;
  color:var(--ink2);
  margin-bottom:12px;
}
.cond-opts{
  display:flex;flex-direction:column;gap:8px;
}

/* Cada condição = botão grande tipo "check item" */
.cond-row{
  width:100%;
  background:var(--surf);
  border:2.5px solid var(--line);
  border-radius:12px;
  padding:14px 14px;
  display:flex;align-items:center;gap:12px;
  text-align:left;
  transition:all .12s;
}
.cond-row:active{transform:scale(.985)}

/* Estados */
.cond-row.g.on{border-color:var(--g);background:var(--g-bg);animation:pop .2s ease}
.cond-row.b.on{border-color:var(--b);background:var(--b-bg);animation:pop .2s ease}
.cond-row.p.on{border-color:var(--p);background:var(--p-bg);animation:pop .2s ease}

/* Check square */
.cond-chk{
  width:28px;height:28px;
  border-radius:8px;
  border:2.5px solid var(--line3);
  background:var(--surf);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:all .12s;
}
.cond-row.g.on .cond-chk{background:var(--g);border-color:var(--g)}
.cond-row.b.on .cond-chk{background:var(--b);border-color:var(--b)}
.cond-row.p.on .cond-chk{background:var(--p);border-color:var(--p)}
.cond-chk svg{width:18px;height:18px;color:#FFF;opacity:0;stroke-width:3.5}
.cond-row.on .cond-chk svg{opacity:1}

/* Cond label */
.cond-label{flex:1;min-width:0}
.cond-title{
  font-size:16px;font-weight:800;color:var(--ink);
  letter-spacing:-.01em;line-height:1.15;
  font-family:var(--mono);
}
.cond-row.g.on .cond-title{color:var(--g-ink)}
.cond-row.b.on .cond-title{color:var(--b-ink)}
.cond-row.p.on .cond-title{color:var(--p-ink)}
.cond-sub{
  font-size:13px;color:var(--ink2);font-weight:600;margin-top:2px;
}
.cond-row.on .cond-sub{color:var(--ink)}

/* Cond stats — só aparece quando selecionado */
.cond-stats{
  display:none;
  text-align:right;flex-shrink:0;
}
.cond-row.on .cond-stats{display:block}
.cond-unit{
  font-family:var(--mono);font-size:18px;font-weight:800;
  line-height:1;letter-spacing:-.02em;
}
.cond-row.g.on .cond-unit{color:var(--g-ink)}
.cond-row.b.on .cond-unit{color:var(--b-ink)}
.cond-row.p.on .cond-unit{color:var(--p-ink)}
.cond-disc{
  font-family:var(--mono);font-size:12px;font-weight:700;
  margin-top:3px;
}
.cond-row.g.on .cond-disc{color:var(--g)}
.cond-row.b.on .cond-disc{color:var(--b)}
.cond-row.p.on .cond-disc{color:var(--p)}

/* Quando NÃO selecionado, mostra o desconto em texto cinza */
.cond-quick{
  font-family:var(--mono);font-size:13px;font-weight:700;
  color:var(--ink2);flex-shrink:0;
}
.cond-row.on .cond-quick{display:none}

/* ═══════════════ EMPTY ═══════════════ */
.empty{text-align:center;padding:80px 20px}
.empty-ico{font-size:48px;margin-bottom:16px}
.empty h3{font-size:20px;font-weight:800;color:var(--ink);margin-bottom:8px}
.empty p{font-size:15px;color:var(--ink2);font-weight:600}

/* ═══════════════ BOTTOM CTA ═══════════════ */
.bcta{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:520px;z-index:100;
  background:var(--bg);
  padding:12px 12px calc(12px + var(--sab));
  border-top:2px solid var(--line);
}
.bcta-btn{
  width:100%;height:60px;
  background:var(--ink);
  color:#FFF;
  border-radius:14px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  font-size:17px;font-weight:800;
  letter-spacing:-.01em;
  box-shadow:0 4px 0 #000;
}
.bcta-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #000}
.bcta-left{display:flex;align-items:center;gap:12px}
.bcta-icon{font-size:22px}
.bcta-pill{
  background:#F59E0B;color:#000;
  border-radius:999px;padding:4px 14px;
  font-family:var(--mono);font-weight:800;font-size:15px;
}

/* ═══════════════ SHEET ═══════════════ */
.overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(10,10,10,.7);
  backdrop-filter:blur(4px);
  animation:fadeIn .15s ease;
}
.sheet{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:520px;
  background:var(--bg);
  border-radius:22px 22px 0 0;
  max-height:94dvh;
  display:flex;flex-direction:column;
  animation:sheetIn .28s cubic-bezier(.32,.72,0,1);
  box-shadow:0 -10px 40px rgba(0,0,0,.3);
}
.sheet-h{
  background:var(--ink);
  border-radius:22px 22px 0 0;
  padding:18px 16px;
  display:flex;align-items:center;gap:14px;
  flex-shrink:0;
}
.sheet-back{
  width:44px;height:44px;border-radius:12px;
  background:rgba(255,255,255,.1);
  color:#FFF;font-size:22px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
}
.sheet-title h2{font-size:19px;font-weight:800;color:#FFF;letter-spacing:-.01em}
.sheet-title p{font-size:13px;color:#A3A3A3;font-weight:600;margin-top:2px;font-family:var(--mono)}
.sheet-items{flex:1;overflow:auto;padding:14px 12px 4px}

/* Sheet item */
.si{
  background:var(--surf);
  border:2px solid var(--line);
  border-radius:14px;
  margin-bottom:10px;
  overflow:hidden;
}
.si.g{border-color:var(--g)}
.si.b{border-color:var(--b)}
.si.p{border-color:var(--p)}

.si-h{
  padding:14px;
  display:flex;align-items:flex-start;gap:12px;
}
.si-cond{
  border-radius:10px;padding:6px 12px;
  font-family:var(--mono);font-weight:800;font-size:14px;
  flex-shrink:0;
  letter-spacing:.02em;
}
.si.g .si-cond{background:var(--g);color:#FFF}
.si.b .si-cond{background:var(--b);color:#FFF}
.si.p .si-cond{background:var(--p);color:#FFF}

.si-info{flex:1;min-width:0}
.si-name{
  font-size:16px;font-weight:800;color:var(--ink);
  line-height:1.25;letter-spacing:-.01em;
}
.si-code{
  font-family:var(--mono);font-size:12px;color:var(--ink3);font-weight:600;
  margin-top:4px;
}
.si-rm{
  width:36px;height:36px;border-radius:10px;
  background:var(--surf2);color:var(--ink2);
  font-size:22px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;line-height:1;
}
.si-rm:active{background:#FEE2E2;color:#991B1B}

.si-body{
  padding:12px 14px 14px;
  background:var(--surf2);
  border-top:2px solid var(--line);
  display:flex;flex-direction:column;gap:8px;
  font-family:var(--mono);
}
.si-line{display:flex;justify-content:space-between;align-items:center;font-size:14px}
.si-line-label{color:var(--ink2);font-weight:600}
.si-line-val{color:var(--ink);font-weight:800}
.si-line.main{
  padding-top:8px;
  border-top:2px solid var(--line2);
  margin-top:4px;
}
.si-line.main .si-line-label{font-size:14px;color:var(--ink);font-weight:700}
.si-line.main .si-line-val{font-size:20px;color:var(--amb);font-weight:800}

/* Summary */
.summ{padding:8px 12px 14px;flex-shrink:0}
.summ-card{
  background:var(--ink);
  border-radius:16px;
  padding:18px 18px;
  color:#FFF;
}
.summ-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;
  font-family:var(--mono);
}
.summ-row.hero{
  padding-bottom:12px;margin-bottom:12px;
  border-bottom:2px solid rgba(255,255,255,.1);
}
.summ-row.hero .summ-label{font-size:14px;color:#A3A3A3;font-weight:700}
.summ-row.hero .summ-val{font-size:24px;color:#F59E0B;font-weight:800;letter-spacing:-.02em}
.summ-row.eco .summ-label{font-size:13px;color:#A3A3A3;font-weight:600}
.summ-row.eco .summ-val{font-size:15px;color:#10B981;font-weight:800}
.summ-row.bri .summ-label{font-size:13px;color:#A3A3A3;font-weight:600}
.summ-row.bri .summ-val{font-size:15px;color:#FFF;font-weight:800}

/* WhatsApp CTA */
.wa-wrap{padding:0 12px calc(14px + var(--sab));flex-shrink:0}
.wa-btn{
  width:100%;height:64px;
  background:var(--wa);
  color:#FFF;
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;gap:14px;
  font-size:18px;font-weight:800;
  letter-spacing:-.01em;
  box-shadow:0 4px 0 var(--wa2);
}
.wa-btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--wa2)}
.wa-btn svg{width:26px;height:26px;flex-shrink:0}


.pwa-banner {
  position: fixed;
  bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 520px;
  z-index: 999;
  padding: 12px 12px calc(12px + env(safe-area-inset-bottom, 0px));
  background: transparent;
  pointer-events: none;
}
.pwa-card {
  background: #1A1A1A;
  border: 2px solid #F59E0B;
  border-radius: 16px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  pointer-events: all;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  animation: slideUp .3s cubic-bezier(.32,.72,0,1);
}
.pwa-icon {
  width: 48px; height: 48px;
  background: #F59E0B;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-weight: 800; font-size: 14px; color: #000;
  flex-shrink: 0;
}
.pwa-text { flex: 1; min-width: 0; }
.pwa-text strong { display: block; font-size: 14px; font-weight: 800; color: #FFF; line-height: 1.2; }
.pwa-text span { display: block; font-size: 12px; color: #A3A3A3; font-weight: 600; margin-top: 3px; line-height: 1.3; }
.pwa-install {
  background: #F59E0B;
  border: none; border-radius: 10px;
  padding: 10px 16px;
  font-size: 14px; font-weight: 800; color: #000;
  cursor: pointer; flex-shrink: 0;
  white-space: nowrap;
}
.pwa-install:active { opacity: .8; }
.pwa-close {
  background: none; border: none;
  color: #525252; font-size: 22px; cursor: pointer;
  padding: 4px; flex-shrink: 0; line-height: 1;
}


/* ═══ INSTALL JOURNEY ═══ */
.ij-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: #0A0A0A;
  display: flex; flex-direction: column;
  max-width: 520px; margin: 0 auto;
  animation: fadeIn .3s ease;
}
.ij-top {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 32px 28px 24px;
  text-align: center;
}
.ij-icon {
  width: 96px; height: 96px;
  background: #F59E0B;
  border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-weight: 800; font-size: 32px; color: #000;
  margin-bottom: 24px;
  box-shadow: 0 0 0 8px rgba(245,158,11,.15), 0 0 0 16px rgba(245,158,11,.07);
  animation: pop .5s .2s both;
}
.ij-title {
  font-size: 26px; font-weight: 800; color: #FFF;
  letter-spacing: -.02em; line-height: 1.15;
  margin-bottom: 10px;
}
.ij-sub {
  font-size: 15px; color: #737373; font-weight: 600;
  line-height: 1.5; max-width: 280px;
}
/* Benefits */
.ij-benefits {
  width: 100%; margin-top: 28px;
  display: flex; flex-direction: column; gap: 10px;
}
.ij-benefit {
  display: flex; align-items: center; gap: 14px;
  background: #161616; border: 1.5px solid #262626;
  border-radius: 14px; padding: 14px 16px; text-align: left;
}
.ij-benefit-ico {
  font-size: 22px; flex-shrink: 0; width: 36px; text-align: center;
}
.ij-benefit-text strong {
  display: block; font-size: 14px; font-weight: 800; color: #FFF; line-height: 1.2;
}
.ij-benefit-text span {
  display: block; font-size: 12px; color: #737373; font-weight: 600; margin-top: 2px;
}
/* Steps (iOS) */
.ij-steps {
  width: 100%; margin-top: 24px;
  display: flex; flex-direction: column; gap: 8px;
}
.ij-step {
  display: flex; align-items: center; gap: 14px;
  background: #161616; border: 1.5px solid #262626;
  border-radius: 14px; padding: 14px 16px; text-align: left;
}
.ij-step-num {
  width: 28px; height: 28px; border-radius: 8px;
  background: #F59E0B; color: #000;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px; flex-shrink: 0;
}
.ij-step-info strong {
  display: block; font-size: 14px; font-weight: 800; color: #FFF; line-height: 1.2;
}
.ij-step-info span {
  display: block; font-size: 12px; color: #737373; font-weight: 600; margin-top: 2px;
}
/* Arrow animation for iOS */
.ij-arrow {
  position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%);
  font-size: 28px; color: #F59E0B;
  animation: bounce 1s ease infinite;

  {id:'c15_1', label:'15 + 1', cls:'g', compra:15, recebe:16, bonus:1,  pct:6.25},

  {id:'c30_10',label:'30 + 10',cls:'p', compra:30, recebe:40, bonus:10, pct:25.00},
];
const CMAP=Object.fromEntries(CONDS.map(c=>[c.id,c]));

const fmt=v=>v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fpct=v=>v.toFixed(2).replace('.',',')+'%';

// ═══════ STATE ═══════
// cart: {"codigo_condId": true}  → permite MESMO produto com múltiplas condições
let query='';
let cart={};
let opened=new Set();    // produtos expandidos
let cartOpen=false;
let focusSearch=false;

function fscore(s,q){
  s=s.toLowerCase();q=q.toLowerCase();
  if(s.includes(q))return 100-s.indexOf(q);
  let sc=0,qi=0;
  for(let i=0;i<s.length&&qi<q.length;i++)if(s[i]===q[qi]){sc++;qi++;}
  return qi===q.length?sc:0;
}
function filtered(){
  if(!query.trim())return PRODS;
  return PRODS.map(p=>({p,s:Math.max(fscore(p.nome,query),fscore(p.codigo,query)*1.5)}))
    .filter(r=>r.s>0).sort((a,b)=>b.s-a.s).map(r=>r.p);
}
function cartItems(){
  return Object.keys(cart).map(key=>{
    const [cod,condId]=key.split('__');
    const p=PRODS.find(pr=>pr.codigo===cod);
    const cond=CMAP[condId];
    const cData=p[condId];
    const total=cond.compra*p.preco;
    const eco=cData.desconto_rs*cond.compra;
    return{key,p,condId,cond,cData,total,eco};
  });
}
function cartCount(){return Object.keys(cart).length}
function hasSel(cod){return CONDS.some(c=>cart[`${cod}__${c.id}`])}

function toggleOpen(cod){
  if(opened.has(cod))opened.delete(cod);
  else opened.add(cod);
  render();
}
function toggleCondition(cod,condId){
  const key=`${cod}__${condId}`;
  if(cart[key])delete cart[key];
  else cart[key]=true;
  render();
}
function removeItem(key){
  delete cart[key];
  render();
}

function sendWA(){
  const items=cartItems();
  const totalPed=items.reduce((s,it)=>s+it.total,0);
  const totalEco=items.reduce((s,it)=>s+it.eco,0);
  const totalBri=items.reduce((s,it)=>s+it.cond.bonus,0);
  
  const lines=items.map(it=>[
    `*${it.p.nome}* (#${it.p.codigo})`,
    `  Condição: *${it.cond.label}* — recebe ${it.cond.recebe} un`,
    `  Unit. efetivo: R$ ${fmt(it.cData.unitario)} (−${fpct(it.cData.desconto_pct)})`,
    `  Total: *R$ ${fmt(it.total)}*`
  ].join('\n')).join('\n\n');
  
  const msg=[
    '🐾 *PEDIDO — AVERT SC*',
    '📅 Tabela 05/03/2026 · Prazo 56 dias',
    '',
    lines,
    '',
    '━━━━━━━━━━━━━━━━━',
    `💰 *TOTAL: R$ ${fmt(totalPed)}*`,
    `✨ Economia: R$ ${fmt(totalEco)}`,
    `🎁 Brindes: ${totalBri} unidades`
  ].join('\n');
  
  window.open(`https://wa.me/5547988694878?text=${encodeURIComponent(msg)}`,'_blank');
}

// ═══════ DOM HELPERS ═══════
function el(tag,attrs,children){
  const e=document.createElement(tag);
  for(const k in attrs||{}){
    const v=attrs[k];
    if(v==null||v===false)continue;
    if(k==='class')e.className=v;
    else if(k==='style')e.style.cssText=v;
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  (children||[]).filter(c=>c!=null&&c!==false).forEach(c=>{
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
}

  s.setAttribute('stroke-linecap','round');

  s.innerHTML='<polyline points="5 13 9 17 19 7"/>';

}

// ═══════ COMPONENTS ═══════
function makeCondRow(p,cond){
  const key=`${p.codigo}__${cond.id}`;
  const on=!!cart[key];
  const cData=p[cond.id];
  
  return el('button',{
    class:`cond-row ${cond.cls}${on?' on':''}`,
    onclick:(e)=>{e.stopPropagation();toggleCondition(p.codigo,cond.id);}
  },[
    el('div',{class:'cond-chk'},[checkSvg()]),
    el('div',{class:'cond-label'},[
      el('div',{class:'cond-title'},[cond.label]),
      el('div',{class:'cond-sub'},[`Recebe ${cond.recebe} un · paga ${cond.compra}`]),
    ]),
    // Quick discount (when off) OR full stats (when on)
    on
      ? el('div',{class:'cond-stats'},[
          el('div',{class:'cond-unit'},[`R$ ${fmt(cData.unitario)}`]),
          el('div',{class:'cond-disc'},[`−${fpct(cData.desconto_pct)}`]),
        ])
      : el('div',{class:'cond-quick'},[`−${fpct(cond.pct)}`]),
  ]);
}

function makeCard(p){
  const isOpen=opened.has(p.codigo);
  const selected=hasSel(p.codigo);
  const selCount=CONDS.filter(c=>cart[`${p.codigo}__${c.id}`]).length;
  
  const head=el('div',{class:'card-h',onclick:()=>toggleOpen(p.codigo)},[
    el('div',{class:'expand-ico'},[isOpen?'▾':'▸']),
    el('div',{class:'prod-info'},[
      el('div',{class:'prod-name',title:p.nome},[p.nome]),
      el('div',{class:'prod-meta'},[
        el('span',{class:'prod-code'},[`#${p.codigo}`]),
        el('span',{class:'prod-sep'},['·']),
        el('span',{class:'prod-price'},[`R$ ${fmt(p.preco)}`]),
        p.pdv?el('span',{class:'prod-sep'},['·']):null,
        p.pdv?el('span',{class:'prod-pdv'},[`PDV ${fmt(p.pdv)}`]):null,
      ]),
    ]),
    selCount>0?el('div',{class:'prod-badge'},[`${selCount}×`]):null,
  ]);
  
  const box=el('div',{class:'cond-box'},[
    el('div',{class:'cond-h'},['Escolher condição(ões)']),
    el('div',{class:'cond-opts'},CONDS.map(c=>makeCondRow(p,c))),
  ]);
  
  return el('div',{
    class:`card ${isOpen?'open':''} ${selected?'has-sel':''}`
  },[head,box]);
}

function makeSheetItem(it){
  const {key,p,cond,cData,total,eco}=it;
  return el('div',{class:`si ${cond.cls}`},[
    el('div',{class:'si-h'},[
      el('div',{class:'si-cond'},[cond.label]),
      el('div',{class:'si-info'},[
        el('div',{class:'si-name'},[p.nome]),
        el('div',{class:'si-code'},[`#${p.codigo} · Base R$ ${fmt(p.preco)}`]),
      ]),
      el('button',{class:'si-rm',onclick:()=>removeItem(key)},['×']),
    ]),
    el('div',{class:'si-body'},[
      el('div',{class:'si-line'},[
        el('span',{class:'si-line-label'},[`Unit. efetivo (${cond.recebe} un recebidas)`]),
        el('span',{class:'si-line-val'},[`R$ ${fmt(cData.unitario)}`]),
      ]),
      el('div',{class:'si-line'},[
        el('span',{class:'si-line-label'},[`Desconto por unidade`]),
        el('span',{class:'si-line-val',style:`color:var(--${cond.cls==='g'?'g':cond.cls==='b'?'b':'p'})`},[`−${fpct(cData.desconto_pct)}`]),
      ]),
      el('div',{class:'si-line main'},[
        el('span',{class:'si-line-label'},[`Total do item (paga ${cond.compra} un)`]),
        el('span',{class:'si-line-val'},[`R$ ${fmt(total)}`]),
      ]),
    ]),
  ]);
}

// ═══════ RENDER ═══════
function render(){
  const app=document.getElementById('app');
  const items=cartItems();
  const count=items.length;
  const prods=filtered();
  
  // Salvar caret da busca pra restaurar
  const prevInp=app.querySelector('#searchInput');
  const selStart=prevInp?prevInp.selectionStart:null;
  
  while(app.firstChild)app.removeChild(app.firstChild);
  
  // ━━━ TOP BAR ━━━
  app.appendChild(el('div',{class:'top'},[
    el('div',{class:'top-logo'},['AV']),
    el('div',{class:'top-title'},[
      el('h1',{},['AVERT SC']),
      el('p',{},['Tabela 05/03/2026 · 56 dias']),
    ]),
    count>0
      ? el('button',{class:'top-count',onclick:()=>{cartOpen=true;render();}},[`🛒 ${count}`])
      : null,
  ]));
  
  // ━━━ SEARCH ━━━
  const inp=el('input',{
    id:'searchInput',type:'text',
    placeholder:'Buscar produto…',autocomplete:'off',spellcheck:'false',
    oninput:(e)=>{query=e.target.value;focusSearch=true;render();},
    value:query,
  });
  const clr=query?el('button',{class:'srch-clr',onclick:()=>{query='';focusSearch=true;render();}},['×']):null;
  app.appendChild(el('div',{class:'srch'},[
    el('div',{class:'srch-box'},[
      el('div',{class:'srch-ico'},['⌕']),
      inp, clr,
    ]),
  ]));
  
  // ━━━ COUNT BAR ━━━
  app.appendChild(el('div',{class:'cntb'},[
    el('span',{class:'cntb-total'},[query?`${prods.length} encontrado${prods.length!==1?'s':''}`:`${PRODS.length} produtos`]),
    count>0?el('span',{class:'cntb-sel'},[`${count} no carrinho`]):null,
  ]));
  
  // ━━━ LIST ━━━
  const list=el('div',{class:'plist'},[]);
  if(prods.length===0){
    list.appendChild(el('div',{class:'empty'},[
      el('div',{class:'empty-ico'},['🔍']),
      el('h3',{},['Nenhum produto encontrado']),
      el('p',{},['Tente outro nome ou código']),
    ]));
  }else{
    prods.forEach(p=>list.appendChild(makeCard(p)));
  }
  app.appendChild(list);
  
  // ━━━ BOTTOM CTA ━━━
  if(count>0&&!cartOpen){
    app.appendChild(el('div',{class:'bcta'},[
      el('button',{class:'bcta-btn',onclick:()=>{cartOpen=true;render();}},[
        el('div',{class:'bcta-left'},[
          el('span',{class:'bcta-icon'},['🛒']),
          el('span',{},['Ver pedido']),
        ]),
        el('span',{class:'bcta-pill'},[`${count} ${count===1?'item':'itens'}`]),
      ]),
    ]));
  }
  
  // ━━━ SHEET ━━━
  if(cartOpen){
    const totalPed=items.reduce((s,it)=>s+it.total,0);
    const totalEco=items.reduce((s,it)=>s+it.eco,0);
    const totalBri=items.reduce((s,it)=>s+it.cond.bonus,0);
    
    const overlay=el('div',{class:'overlay'},[]);
    overlay.onclick=(e)=>{if(e.target===overlay){cartOpen=false;render();}};
    
    const sheet=el('div',{class:'sheet'},[
      el('div',{class:'sheet-h'},[
        el('button',{class:'sheet-back',onclick:()=>{cartOpen=false;render();}},['←']),
        el('div',{class:'sheet-title'},[
          el('h2',{},['Seu pedido']),
          el('p',{},[`${count} ${count===1?'item':'itens'} · ${totalBri} un de brinde`]),
        ]),
      ]),
      el('div',{class:'sheet-items'},items.map(it=>makeSheetItem(it))),
      el('div',{class:'summ'},[
        el('div',{class:'summ-card'},[
          el('div',{class:'summ-row hero'},[
            el('span',{class:'summ-label'},['TOTAL DO PEDIDO']),
            el('span',{class:'summ-val'},[`R$ ${fmt(totalPed)}`]),
          ]),
          el('div',{class:'summ-row eco'},[
            el('span',{class:'summ-label'},['Economia gerada']),
            el('span',{class:'summ-val'},[`−R$ ${fmt(totalEco)}`]),
          ]),
          el('div',{class:'summ-row bri'},[
            el('span',{class:'summ-label'},['Brindes inclusos']),
            el('span',{class:'summ-val'},[`${totalBri} un`]),
          ]),
        ]),
      ]),
      el('div',{class:'wa-wrap'},[
        el('button',{class:'wa-btn',onclick:sendWA},[waSvg(),tx('Enviar pelo WhatsApp')]),
      ]),
    ]);
    overlay.appendChild(sheet);
    app.appendChild(overlay);
  }
  
  // Restaurar foco da busca
  if(focusSearch){
    requestAnimationFrame(()=>{
      const newInp=app.querySelector('#searchInput');
      if(newInp){
        newInp.focus();
        if(selStart!=null){try{newInp.setSelectionRange(selStart,selStart);}catch(e){}}
      }
      focusSearch=false;
    });
  }
}





/* ═══ INSTALL JOURNEY ═══ */
(function() {
  let deferredPrompt = null;
  const alreadyShown = localStorage.getItem('ij-done');
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;

  if (isStandalone || alreadyShown) return;

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
  const isAndroid = /android/i.test(navigator.userAgent);

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
  });

  function dismiss() {
    const ov = document.getElementById('ijOverlay');
    if (ov) { ov.style.animation = 'none'; ov.style.opacity = '0'; ov.style.transition = 'opacity .25s'; setTimeout(() => ov.remove(), 250); }
    localStorage.setItem('ij-done', '1');
  }

  function buildOverlay() {
    const ov = document.createElement('div');
    ov.className = 'ij-overlay'; ov.id = 'ijOverlay';

    const platform = isIOS ? '🍎 iPhone / iPad' : isAndroid ? '🤖 Android' : '💻 Desktop';
    const platformLabel = `<div class="ij-platform"><span>Dispositivo:</span> ${platform}</div>`;

    const benefits = `
      <div class="ij-benefits">
        <div class="ij-benefit"><div class="ij-benefit-ico">⚡</div><div class="ij-benefit-text"><strong>Abre instantâneo</strong><span>Sem digitar endereço — ícone na tela principal</span></div></div>
        <div class="ij-benefit"><div class="ij-benefit-ico">📡</div><div class="ij-benefit-text"><strong>Funciona offline</strong><span>Sem internet? Os preços continuam disponíveis</span></div></div>
        <div class="ij-benefit"><div class="ij-benefit-ico">📱</div><div class="ij-benefit-text"><strong>Tela cheia</strong><span>Sem barra do navegador — parece app nativo</span></div></div>
      </div>`;

    let stepsHtml = '';
    let btnHtml = '';
    let arrowHtml = '';

    if (isIOS) {
      stepsHtml = `
        <div class="ij-steps">
          <div class="ij-step"><div class="ij-step-num">1</div><div class="ij-step-info"><strong>Toque em Compartilhar</strong><span>Botão ⎙ na barra inferior do Safari</span></div></div>
          <div class="ij-step"><div class="ij-step-num">2</div><div class="ij-step-info"><strong>Role e toque em "Adicionar à Tela de Início"</strong><span>Pode precisar rolar pra baixo no menu</span></div></div>
          <div class="ij-step"><div class="ij-step-num">3</div><div class="ij-step-info"><strong>Toque em "Adicionar"</strong><span>O ícone AVERT SC aparece na sua tela</span></div></div>
        </div>`;
      arrowHtml = `<div class="ij-arrow">↓</div>`;
      btnHtml = `<button class="ij-install-btn" id="ijClose">✓ Entendido, vou instalar</button>`;
    } else {
      btnHtml = `<button class="ij-install-btn" id="ijInstall">📲 Instalar agora</button>`;
    }

    ov.innerHTML = `
      <div class="ij-top">
        <div class="ij-icon">AV</div>
        ${platformLabel}
        <div class="ij-title">Instale o AVERT SC<br>na sua tela</div>
        <div class="ij-sub">Use como app — rápido, offline e sempre na mão durante visitas a clientes</div>
        ${benefits}
        ${stepsHtml}
      </div>
      ${arrowHtml}
      <div class="ij-cta">
        ${btnHtml}
        <button class="ij-skip" id="ijSkip">Usar só pelo navegador</button>
      </div>`;

    document.body.appendChild(ov);

    document.getElementById('ijSkip').onclick = dismiss;

    if (isIOS) {
      document.getElementById('ijClose').onclick = dismiss;
    } else {
      document.getElementById('ijInstall').onclick = async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          deferredPrompt = null;
          dismiss();
        } else {
          // Chrome já pode ter mostrado o banner ou está em desktop
          dismiss();
        }
      };
    }
  }

  // Mostrar na primeira abertura com delay mínimo
  window.addEventListener('load', () => setTimeout(buildOverlay, 800));
})();

render();
</script>

  });
